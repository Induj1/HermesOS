name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a PR makes the in-flight run obsolete. Cancel it rather than
# paying for a result nobody will read. Never cancel on main: those runs gate
# the release history.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # The pre-commit hook is meaningless on a CI checkout, and `pnpm install`
  # would otherwise run husky via the root `prepare` script.
  HUSKY: 0

jobs:
  # lint and typecheck are separate jobs, not steps in one: they are
  # independent, so they run in parallel, and a failure names which one broke
  # without hiding the other's result behind an early exit.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Must precede setup-node: setup-node's `cache: pnpm` needs the pnpm
      # binary to resolve the store path.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint --max-warnings=0

      - name: Prettier
        run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: tsc
        run: pnpm run typecheck

  # The build must pass on its own: dist/ is what the Docker image ships, and a
  # package that type-checks can still fail to emit (a bad "exports" path, a
  # rootDir mismatch). Kept separate from typecheck so a broken emit is named.
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build

  # Tests with coverage. Each package enforces its own ≥95% branch threshold in
  # vitest.config.ts, so a coverage regression fails here rather than merging.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Vitest (with coverage thresholds)
        run: pnpm run test:coverage

  # Fail the build on a known vulnerability in a production dependency. The
  # runtime surface is tiny (one non-@hermes/* dep), so this should stay quiet;
  # when it fires, triage the finding in docs/security/audit.md.
  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: pnpm audit (production dependencies)
        run: pnpm audit --prod
